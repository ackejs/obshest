<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ответы на экзамен</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffef9;
    --accent: #c0392b;
    --accent2: #2c3e50;
    --text: #1a1a1a;
    --muted: #666;
    --border: #ddd5c4;
    --num: #e8e0d0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--accent2);
    color: #fff;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    border-bottom: 4px solid var(--accent);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    letter-spacing: -0.5px;
    margin-bottom: 0.4rem;
  }

  header p {
    color: #aab;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .search-bar {
    display: flex;
    justify-content: center;
    padding: 1.5rem 1rem;
    background: var(--accent2);
  }

  .search-bar input {
    width: 100%;
    max-width: 520px;
    padding: 0.7rem 1.2rem;
    border: none;
    border-radius: 4px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.95rem;
    background: #fff;
    color: var(--text);
    outline: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .search-bar input:focus {
    box-shadow: 0 0 0 3px rgba(192,57,43,0.4);
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
  }

  .count-label {
    text-align: right;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 1rem;
    letter-spacing: 0.5px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 6px;
    padding: 1.2rem 1.4rem 1.2rem 1rem;
    margin-bottom: 0.9rem;
    display: flex;
    gap: 1rem;
    transition: box-shadow 0.15s, transform 0.15s;
  }

  .card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    transform: translateY(-1px);
  }

  .num {
    min-width: 2.4rem;
    height: 2.4rem;
    background: var(--num);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
  }

  .body {
    flex: 1;
  }

  .body strong.title {
    display: block;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--accent2);
    margin-bottom: 0.3rem;
  }

  .body p {
    font-size: 0.875rem;
    color: #333;
    line-height: 1.65;
  }

  .hidden { display: none; }

  .no-results {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 1rem;
  }

  /* Tabs */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    background: var(--accent2);
    padding: 0 1rem 1.2rem;
  }

  .tab {
    background: transparent;
    color: #aab;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 0.5rem 1.4rem;
    border-radius: 20px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab:hover { color: #fff; border-color: #fff; }

  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Practical task cards */
  .task-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent2);
    border-radius: 6px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 0.9rem;
    transition: box-shadow 0.15s;
  }

  .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

  .task-head {
    display: flex;
    gap: 0.8rem;
    align-items: baseline;
    margin-bottom: 0.6rem;
  }

  .task-card .num {
    min-width: 2.4rem;
    height: 2.4rem;
  }

  .task-card .topic {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--accent2);
    align-self: center;
  }

  .task-card .q {
    font-size: 0.85rem;
    color: #444;
    line-height: 1.6;
    margin-bottom: 0.7rem;
  }

  .task-card .a {
    font-size: 0.85rem;
    color: #1a1a1a;
    line-height: 1.65;
    background: #f4f1e8;
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 0.7rem 0.9rem;
  }

  .task-card .a b { color: var(--accent); }
  .task-card .a .law { color: var(--accent2); font-style: italic; }

  @media (max-width: 500px) {
    .card { padding: 1rem 0.8rem; }
    .num { min-width: 2rem; height: 2rem; font-size: 0.85rem; }
    .tab { padding: 0.45rem 1rem; font-size: 0.82rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Ответы на экзамен</h1>
  <p>Обществознание · 58 вопросов · 29 задач</p>
</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="Поиск по вопросу или содержанию…" oninput="filterCards()">
</div>

<div class="tabs">
  <button class="tab active" id="tab-theory" onclick="switchTab('theory')">Теория · 58</button>
  <button class="tab" id="tab-tasks" onclick="switchTab('tasks')">Задачи · 29</button>
</div>

<main>
  <div class="count-label" id="count">58 вопросов</div>
  <div id="cards"></div>
  <div id="tasks" class="hidden"></div>
  <div class="no-results hidden" id="empty">Ничего не найдено</div>
</main>

<script>
const data = [
  { n: 1, title: "Религия", text: "Сущность — вера в сверхъестественное, мировоззрение. Функции: мировоззренческая, регулятивная, компенсаторная, интегративная, культурно-транслирующая." },
  { n: 2, title: "Административное право", text: "Регулирует общественные отношения в сфере госуправления (деятельность органов власти, госслужба, административные правонарушения)." },
  { n: 3, title: "Политическая система", text: "Совокупность институтов, норм, идей, обеспечивающих власть. Политические институты: государство, партии, общественные организации, выборы." },
  { n: 4, title: "Экологическое право", text: "Регулирует отношения по охране окружающей среды, природопользованию. Нормы содержатся в Конституции РФ, ФЗ «Об охране окружающей среды», Земельном кодексе и др." },
  { n: 5, title: "Социальный конфликт", text: "Столкновение интересов социальных групп. Виды: по сферам (экономический, политический и др.), по участникам (межличностный, межгрупповой), по форме (забастовка, бунт, война)." },
  { n: 6, title: "Правовое государство", text: "Государство, ограниченное правом, где верховенство закона, разделение властей, гарантии прав и свобод. Разделение властей: законодательная, исполнительная, судебная." },
  { n: 7, title: "Социальная защита", text: "Система мер по поддержке уязвимых групп. Меры: пособия, пенсии, льготы, соцобслуживание. Субъекты: государство, работодатели, общественные организации." },
  { n: 8, title: "Трудовое право", text: "Регулирует трудовые отношения между работником и работодателем. Основной источник — Трудовой кодекс РФ." },
  { n: 9, title: "Гражданское общество", text: "Сфера самодеятельности свободных граждан и их объединений, независимая от государства (семья, НКО, бизнес, религия)." },
  { n: 10, title: "Условия трудового договора", text: "Обязательные: место работы, трудовая функция, дата начала, зарплата, режим труда. Дополнительные: испытание, неразглашение тайны и др." },
  { n: 11, title: "Социализация индивида", text: "Процесс усвоения социальных норм, ценностей, ролей. Включает агентов (семья, школа, СМИ) и этапы (первичная, вторичная)." },
  { n: 12, title: "Основы конституционного строя РФ", text: "Конституция РФ (гл. 1). Принципы: демократическое, федеративное, правовое государство, республиканская форма правления, разделение властей, суверенитет, права человека." },
  { n: 13, title: "Государство", text: "Центральный институт политической системы. Формы: форма правления (монархия, республика), форма территориального устройства (унитарное, федеративное, конфедерация), политический режим." },
  { n: 14, title: "Молодёжь", text: "Социально-демографическая группа 14–30 лет. Особенности: переходность, незавершённый статус. Молодёжные субкультуры: хиппи, панки, готы, эмо, киберспорт и др." },
  { n: 15, title: "Форма правления", text: "Организация верховной власти. Виды: монархия (абсолютная, конституционная) и республика (президентская, парламентская, смешанная). В РФ — смешанная республика (президентско-парламентская)." },
  { n: 16, title: "Уголовное право", text: "Регулирует отношения, связанные с преступлениями и наказаниями. Источник — Уголовный кодекс РФ." },
  { n: 17, title: "Культура и духовная жизнь", text: "Культура — совокупность материальных и духовных ценностей. Духовная жизнь включает науку, искусство, религию, мораль, образование." },
  { n: 18, title: "Политический режим", text: "Методы осуществления власти. Виды: демократический, авторитарный, тоталитарный. В РФ — демократический режим." },
  { n: 19, title: "Общество как система", text: "Целостная саморазвивающаяся система. Структурные элементы: подсистемы (экономическая, политическая, социальная, духовная) и институты." },
  { n: 20, title: "Административно-территориальное устройство", text: "Деление территории на единицы. Виды: унитарное, федеративное, конфедеративное. В РФ — федеративное устройство (субъекты: республики, края, области, города федерального значения и др.)." },
  { n: 21, title: "Человек как биосоциальное существо", text: "Биологическое (наследственность, физиология) и социальное (речь, мышление, труд). Индивид — единичный представитель; индивидуальность — уникальные черты; личность — социально значимые качества." },
  { n: 22, title: "Юридическая ответственность", text: "Применение санкций за правонарушение. Виды: уголовная, административная, гражданско-правовая, дисциплинарная, материальная." },
  { n: 23, title: "Наука в современном обществе", text: "Двигатель прогресса, форма познания. Функции: познавательная, прогностическая, производственная, мировоззренческая." },
  { n: 24, title: "Принципы юридической ответственности", text: "Законность, справедливость, неотвратимость, индивидуализация, гуманизм, презумпция невиновности." },
  { n: 25, title: "Социальная структура", text: "Совокупность социальных групп: классы, слои, этносы, демографические группы (молодёжь, пенсионеры), профессиональные, территориальные." },
  { n: 26, title: "Цели и функции юридической ответственности", text: "Цели — защита правопорядка, воспитание, предупреждение правонарушений. Функции — карательная, воспитательная, превентивная, восстановительная." },
  { n: 27, title: "Мораль и право", text: "Мораль — форма общественного сознания, регулирующая поведение через нормы (добро, зло, совесть). Общее с правом — регулирование поведения; различия — мораль неписана, опирается на общественное мнение; право — на госпринуждение." },
  { n: 28, title: "Семья и брак", text: "Семья — малая группа на основе брака или родства. Брак — юридически оформленный союз. Семейные отношения регулирует Семейный кодекс РФ." },
  { n: 29, title: "Деятельность", text: "Форма активности, направленная на преобразование мира. Структура: субъект → мотив → цель → средства → действие → результат. Виды: игра, учёба, труд, общение." },
  { n: 30, title: "Право", text: "Система общеобязательных норм, охраняемых государством. Место в системе соц. норм: рядом с моралью, обычаями, религиозными нормами. Отрасли: конституционное, уголовное, гражданское и др. Институты — подотрасли (например, институт собственности)." },
  { n: 31, title: "Налоговое право", text: "Подотрасль финансового права. Источник: Налоговый кодекс РФ. Виды налогов: федеральные (НДС, НДФЛ), региональные (транспортный), местные (земельный)." },
  { n: 32, title: "Правонарушение", text: "Виновное, противоправное деяние, наносящее вред. Признаки: деяние (действие/бездействие), противоправность, виновность, общественная опасность (для преступления) или вредность (для проступка)." },
  { n: 33, title: "Органы исполнительной власти РФ", text: "Правительство РФ, федеральные министерства, службы, агентства; региональные — правительства, администрации." },
  { n: 34, title: "Права и обязанности человека и гражданина", text: "Конституция РФ, гл. 2. Права: на жизнь, свободу, труд, образование и др. Обязанности: соблюдать законы, платить налоги, защищать Отечество, беречь природу." },
  { n: 35, title: "Правонарушение и преступление", text: "Правонарушение — родовое понятие, преступление — вид (уголовно наказуемое). Отличия: преступление обладает высокой общественной опасностью, предусмотрено УК РФ, влечёт судимость." },
  { n: 36, title: "Занятость и трудоустройство", text: "Деятельность граждан, связанная с работой. Регулирует Закон РФ «О занятости населения в Российской Федерации»." },
  { n: 37, title: "Конституция — основной закон государства", text: "Конституция обладает высшей юридической силой, закрепляет основы строя, права, систему власти." },
  { n: 38, title: "Состав правонарушения", text: "Объект (охраняемые ценности), объективная сторона (деяние, вред, связь), субъект (деликтоспособное лицо), субъективная сторона (вина, мотив)." },
  { n: 39, title: "Обязанности человека и гражданина", text: "Соблюдать законы, платить налоги, воинская обязанность, охрана природы, забота о памятниках культуры, получение основного общего образования." },
  { n: 40, title: "Семейное право", text: "Семейный кодекс РФ регулирует личные неимущественные и имущественные отношения между супругами, родителями и детьми, алиментные обязательства." },
  { n: 41, title: "Способы разрешения социальных конфликтов", text: "Переговоры, посредничество, арбитраж, компромисс, уступки, применение силы (в исключительных случаях)." },
  { n: 42, title: "Право на образование", text: "Ст. 43 Конституции РФ. Формы образования: очная, очно-заочная (вечерняя), заочная, семейное образование, самообразование, экстернат." },
  { n: 43, title: "Способы разрешения социальных конфликтов (2)", text: "Переговоры, посредничество, арбитраж, компромисс, уступки, применение силы (в исключительных случаях)." },
  { n: 44, title: "Правоспособность и дееспособность", text: "Правоспособность — способность иметь права и обязанности (с рождения). Дееспособность — способность своими действиями приобретать права (полная — с 18 лет, частичная — с 14 до 18)." },
  { n: 45, title: "Возраст юридической ответственности", text: "Уголовная — с 16 (за тяжкие с 14); административная — с 16; дисциплинарная — с 16; гражданская — с 14 (ограниченная), с 18 (полная)." },
  { n: 46, title: "Соотношение норм морали, религии, права", text: "Все регулируют поведение. Пример: «не убий» — норма права (УК РФ), морали (совесть), религии (заповедь)." },
  { n: 47, title: "Культура", text: "Совокупность материальных и духовных благ. Виды: материальная (здания, техника) и духовная (искусство, наука). Функции: адаптации, регуляции, коммуникации, трансляции опыта, ценностная." },
  { n: 48, title: "Экономика", text: "Хозяйственная деятельность общества. Виды: реальный сектор, финансовая сфера; по масштабу: микро-, макроэкономика. Значение: удовлетворяет потребности, распределяет ресурсы." },
  { n: 49, title: "Собственность", text: "Отношение присвоения. Способы возникновения: сделки, наследование, создание вещи, реквизиция, национализация. Прекращение: отчуждение, гибель, конфискация, приватизация." },
  { n: 50, title: "Трудовые отношения", text: "Отношения между работником и работодателем. Особенности: личный характер, возмездность, подчинение правилам внутреннего распорядка, длящийся характер." },
  { n: 51, title: "Правомочия собственника", text: "Владение, пользование, распоряжение. Обязанности: бремя содержания, риск утраты, соблюдение законов (налогов, экологических и др.)." },
  { n: 52, title: "Субъекты права", text: "Носители прав и обязанностей: физические лица (граждане, иностранцы, лица без гражданства) и юридические лица (организации), а также публично-правовые образования (государство, муниципалитеты)." },
  { n: 53, title: "Система государственных органов РФ", text: "Законодательные (Федеральное Собрание: СФ и ГД), исполнительные (Правительство, министерства), судебные (КС, ВС и нижестоящие), Президент, прокуратура, ЦИК и др." },
  { n: 54, title: "Роль образования в становлении личности", text: "Передача знаний, социализация, формирование мировоззрения, развитие способностей, приобретение статуса, подготовка к труду." },
  { n: 55, title: "Статус Президента РФ", text: "Глава государства, гарант Конституции, верховный главнокомандующий. Определяет внутреннюю и внешнюю политику, назначает Председателя Правительства (с согласия ГД) и др." },
  { n: 56, title: "Трудовой договор", text: "Соглашение между работником и работодателем. Необходимые документы: паспорт, трудовая книжка, СНИЛС, документы воинского учёта, ИНН, документ об образовании (при необходимости)." },
  { n: 57, title: "Законодательные органы РФ", text: "Федеральное Собрание — парламент (двухпалатный): Совет Федерации (верхняя палата) и Государственная Дума (нижняя палата)." },
  { n: 58, title: "Алиментные обязательства", text: "Родители обязаны содержать несовершеннолетних детей, а также нетрудоспособных совершеннолетних; совершеннолетние дети — нетрудоспособных родителей; супруги — друг друга при нуждаемости (СК РФ)." },
];

const tasks = [
  { n: 1, topic: "Налоги в РФ", q: "Распределите налоги по группам: федеральные, региональные, местные (НДС, НДФЛ, акцизы, налог на прибыль, водный, госпошлина, земельный и др.).", a: "<b>Федеральные:</b> НДС, НДФЛ, акцизы, налог на прибыль организаций, водный налог, государственная пошлина, НДПИ. <b>Региональные:</b> транспортный налог, налог на имущество организаций, налог на игорный бизнес. <b>Местные:</b> земельный налог, налог на имущество физических лиц, торговый сбор. <span class='law'>(ст. 13–15 НК РФ)</span>" },
  { n: 2, topic: "Схема: деятельность человека", q: "Составьте схему: «В процессе деятельности человек …» (три элемента с объяснением).", a: "В процессе деятельности человек: <b>1) преобразует окружающий мир</b> — создаёт «вторую природу», культуру, материальные и духовные ценности; <b>2) познаёт мир и общество</b> — получает новые знания об окружающей действительности; <b>3) изменяет и развивает самого себя</b> — реализует и развивает свои способности, формируется как личность." },
  { n: 3, topic: "Деятельность и поведение животных", q: "Составьте перечень отличий человеческой деятельности от поведения животных.", a: "<b>1.</b> Целенаправленность и осознанность (цель ставится заранее). <b>2.</b> Преобразование природы, а не приспособление к ней. <b>3.</b> Изготовление и использование орудий труда. <b>4.</b> Творческий, продуктивный характер — создание нового. <b>5.</b> Связана с речью, мышлением, носит общественный характер. (Поведение животных инстинктивно и приспособительно.)" },
  { n: 4, topic: "Компоненты деятельности", q: "Сформулируйте и запишите основные компоненты деятельности.", a: "<b>Цель</b> — осознанный образ предполагаемого результата, на который направлена деятельность. <b>Средства</b> — приёмы, способы, орудия и инструменты для достижения цели. <b>Продукты (результаты)</b> — то, что получено в итоге (материальный или духовный результат). <b>Мотив</b> — побуждение к деятельности, то, ради чего она совершается (потребности, интересы)." },
  { n: 5, topic: "Функции культуры", q: "Заполните таблицу: в чём смысл функций культуры (познавательная, нормативная, образовательная, адаптивная).", a: "<b>Познавательная</b> — даёт целостное представление о народе, стране, эпохе, накапливает знания о мире. <b>Нормативная (регулирующая)</b> — устанавливает нормы, правила и ценности, регулирует поведение людей. <b>Образовательная (воспитательная)</b> — формирует личность, передаёт знания и ценности, социализирует. <b>Адаптивная</b> — помогает человеку приспособиться к окружающей среде и условиям жизни." },
  { n: 6, topic: "Функции науки", q: "Заполните таблицу: в чём смысл функций науки (познавательная, мировоззренческая, производственная, культурная, социальная).", a: "<b>Познавательная</b> — производство новых знаний, объяснение явлений мира. <b>Мировоззренческая</b> — формирует научную картину мира и мировоззрение. <b>Производственная</b> — наука как производительная сила: новые технологии, внедрение в производство. <b>Культурная</b> — наука как часть культуры, влияет на образование и развитие личности. <b>Социальная</b> — решение социальных проблем, прогнозирование и управление обществом." },
  { n: 7, topic: "Система образования РФ", q: "Заполните таблицу: структурные элементы системы образования, образовательные учреждения, время обучения.", a: "<b>Дошкольное</b> — детский сад (ясли), с ~2 мес. до 6–7 лет. <b>Начальная школа</b> — школа, 1–4 класс, 4 года. <b>Неполное среднее (основное общее)</b> — школа, 5–9 класс, 5 лет. <b>Полное среднее / профессиональное</b> — школа 10–11 класс (2 года) или колледж/техникум СПО (2–4 года). <b>Высшее</b> — вуз: бакалавриат 4 г., специалитет 5–6 л., магистратура 2 г. <span class='law'>(ФЗ «Об образовании в РФ»)</span>" },
  { n: 8, topic: "Типы культуры", q: "Составьте таблицу: типы (виды) культур и их характеристики.", a: "<b>Народная</b> — создаётся анонимными авторами без профподготовки (фольклор, сказки, песни, обычаи). <b>Массовая</b> — общедоступная, коммерческая, для широкой аудитории (поп-музыка, сериалы, реклама). <b>Элитарная</b> — создаётся профессионалами для узкого подготовленного круга, сложна для восприятия (классика, авангард). <b>Субкультура</b> — культура отдельной группы (молодёжная, профессиональная). <b>Контркультура</b> — противостоит господствующей культуре." },
  { n: 9, topic: "Соответствие: религии", q: "Установите соответствие религий и их типов: А) буддизм, Б) конфуцианство, В) синтоизм, Г) даосизм — 1) мировая, 2) региональная.", a: "<b>А — 1</b> (буддизм — мировая религия). <b>Б — 2</b> (конфуцианство — региональная/национальная). <b>В — 2</b> (синтоизм — региональная, Япония). <b>Г — 2</b> (даосизм — региональная, Китай). <b>Ответ: 1 2 2 2.</b>" },
  { n: 10, topic: "Презумпция невиновности", q: "Газета объявила подсудимого Кудрявцева виновным до приговора суда. Какое конституционное право нарушено?", a: "Нарушена <b>презумпция невиновности</b>: каждый обвиняемый считается невиновным, пока его вина не доказана и не установлена вступившим в силу приговором суда. Журналисты назвали его виновным, тогда как дело ещё рассматривалось. <span class='law'>(ст. 49 Конституции РФ)</span>" },
  { n: 11, topic: "Свидетельский иммунитет", q: "Сидоров вызван свидетелем по делу жены. Может ли он отказаться от показаний (ст. 308 УК)? Почему?", a: "<b>Да, может отказаться.</b> Никто не обязан свидетельствовать против себя, своего супруга и близких родственников. В этом случае ответственность по ст. 308 УК РФ не наступает (свидетельский иммунитет). <span class='law'>(ст. 51 Конституции РФ, прим. к ст. 308 УК РФ)</span>" },
  { n: 12, topic: "Квалификация: хищение", q: "Алешин тайно забрал у спящего пассажира букетик ландышей. Квалифицируйте содеянное.", a: "Тайное хищение чужого имущества — <b>кража</b> <span class='law'>(ст. 158 УК РФ)</span>. Поскольку стоимость букета незначительна (до 2 500 руб.), при отсутствии квалифицирующих признаков деяние образует <b>мелкое хищение</b> — административное правонарушение <span class='law'>(ст. 7.27 КоАП РФ)</span>." },
  { n: 13, topic: "Обман потребителей", q: "Максимов обвесил покупателя на 150 г на сумму 30 руб. Есть ли состав преступления?", a: "<b>Состава преступления нет</b> — ущерб незначителен. Это административное правонарушение — <b>обман потребителей (обвешивание)</b>. Деяние является проступком, а не преступлением. <span class='law'>(ст. 14.7 КоАП РФ)</span>" },
  { n: 14, topic: "Авторское право", q: "Шиков выдаёт рисунки своего малолетнего ученика за свои. Прав ли он?", a: "<b>Не прав.</b> Автором признаётся гражданин, творческим трудом которого создано произведение, независимо от возраста; малолетний тоже является автором. Авторство не переходит к учителю — присвоение авторства (плагиат) недопустимо. <span class='law'>(ст. 1257, 1265 ГК РФ)</span>" },
  { n: 15, topic: "Дискриминация в труде", q: "Обуховой (47 лет) отказали в работе из-за возраста. Правомерны ли действия работодателя?", a: "<b>Неправомерны.</b> Отказ по возрасту, не связанному с деловыми качествами, — это запрещённая дискриминация в сфере труда. Основание обращения в суд — необоснованный отказ в заключении трудового договора; Обухова вправе требовать признать отказ незаконным. <span class='law'>(ст. 3, 64 ТК РФ)</span>" },
  { n: 16, topic: "Труд несовершеннолетних", q: "6-летнему Владимиру предлагают работу театр, цирк и концертная организация. Может ли кто-то заключить с ним трудовой договор?", a: "<b>Да, могут — театр, цирк и концертная организация.</b> Как исключение допускается заключение трудового договора с лицами младше 14 лет в организациях кинематографии, театрах, цирках, концертных организациях для участия в создании/исполнении произведений без ущерба здоровью. Договор подписывает родитель, требуется согласие органа опеки. <span class='law'>(ст. 63 ТК РФ)</span>" },
  { n: 17, topic: "Условия трудового договора", q: "Оцените условия трудового договора с выпускником Ваниным (срок 3 года, тайна, испытание 3 мес., увольнение).", a: "<b>Срочный договор на 3 года — неправомерно</b> (для постоянной должности технолога нет оснований ст. 59 ТК, должен быть бессрочный). <b>Неразглашение тайны — правомерно.</b> <b>Испытание 3 мес. — правомерно</b> (ст. 70). <b>Увольнение за опьянение — правомерно</b> (ст. 81). <b>Увольнение из-за возбуждения уголовного/административного дела — неправомерно</b> (нет такого основания, нарушает презумпцию невиновности). <span class='law'>(ст. 57, 59, 70, 81 ТК РФ)</span>" },
  { n: 18, topic: "Брак по доверенности", q: "Веселов хочет заключить брак через доверенность на друга, т.к. сам в плавании. Будет ли брак зарегистрирован?", a: "<b>Нет.</b> Заключение брака производится при обязательном личном присутствии обоих вступающих в брак; представительство по доверенности при заключении брака не допускается. <span class='law'>(ст. 11 СК РФ)</span>" },
  { n: 19, topic: "Расторжение брака", q: "Супруги Филипповы с двумя несовершеннолетними детьми развелись через ЗАГС за 2 недели. Есть ли нарушение?", a: "<b>Да, нарушение есть.</b> При наличии общих несовершеннолетних детей расторжение брака производится только в судебном порядке. ЗАГС не вправе был расторгать этот брак. <span class='law'>(ст. 21 СК РФ)</span>" },
  { n: 20, topic: "Эмансипация через брак", q: "Николай утверждает, что после вступления несовершеннолетних в брак родители обязаны их содержать ещё год. Прав ли он?", a: "<b>Не прав.</b> При вступлении в брак до 18 лет несовершеннолетний приобретает полную дееспособность (в т.ч. способность самостоятельно себя обеспечивать), поэтому обязанность родителей по содержанию прекращается. <span class='law'>(ст. 21 ГК РФ, ст. 80 СК РФ)</span>" },
  { n: 21, topic: "Прекращение попечительства", q: "Евгений вступил в брак в 16 лет, находясь под попечительством тёти. Остаётся ли он под попечительством?", a: "<b>Нет, не остаётся.</b> Со вступлением в брак несовершеннолетний приобретает полную дееспособность, и попечительство над ним прекращается. <span class='law'>(ст. 21, 40 ГК РФ)</span>" },
  { n: 22, topic: "Труд с 15 лет", q: "15-летнему К. отказали в договоре (нет 16 лет) и потребовали медосмотр. Оцените оба вопроса.", a: "<b>1) Отказ неправомерен:</b> трудовой договор можно заключать с 15 лет — с получившими (получающими) общее образование для лёгкого труда. <b>2) Руководитель прав:</b> все лица до 18 лет принимаются на работу только после обязательного предварительного медосмотра, независимо от срока работы. <span class='law'>(ст. 63, 69, 266 ТК РФ)</span>" },
  { n: 23, topic: "Юридическая ответственность", q: "Петров добровольно отдал соседу 2 бочки огурцов за капусту, съеденную его козой. Это юридическая ответственность?", a: "<b>Нет.</b> Юридическая ответственность применяется государством (его органами) в установленном законом порядке за правонарушение. Здесь — добровольное возмещение вреда по обоюдной договорённости, без участия государства и без процедуры, поэтому это не юридическая ответственность." },
  { n: 24, topic: "Фамилия супругов", q: "Девушка хочет сохранить добрачную фамилию, жених против. Как аргументировать? Есть ли альтернатива?", a: "Каждый из супругов вправе сохранить свою добрачную фамилию — это личное решение, согласия другого супруга не требуется. <b>Альтернатива:</b> присоединить к своей фамилии фамилию супруга (двойная фамилия через дефис), если это допускается. Принуждать жених не вправе. <span class='law'>(ст. 32 СК РФ)</span>" },
  { n: 25, topic: "Раздел имущества", q: "После 20 лет брака муж хочет оставить жену-домохозяйку без имущества, т.к. она не работала. Какое решение примет суд?", a: "Имущество, нажитое в браке, — совместная собственность супругов и делится <b>поровну</b>, независимо от того, кто получал доход. Ведение домашнего хозяйства и уход за детьми — уважительная причина отсутствия заработка, право на долю сохраняется. Суд разделит совместное имущество поровну (½ — Татьяне). <span class='law'>(ст. 34, 38, 39 СК РФ)</span>" },
  { n: 26, topic: "Содержание родителей", q: "Сыновья отказали нетрудоспособному пенсионеру Григорию в помощи. Есть ли ответ в законе?", a: "<b>Да.</b> Трудоспособные совершеннолетние дети обязаны содержать своих нетрудоспособных нуждающихся родителей. Григорий вправе требовать взыскания алиментов с сыновей через суд. <span class='law'>(ст. 87 СК РФ)</span>" },
  { n: 27, topic: "Защита прав потребителей", q: "Телевизор сломался через 10 дней. Директор отказал в замене, направив в мастерскую. Правомерно ли это?", a: "<b>Неправомерно.</b> В отношении технически сложного товара потребитель в течение 15 дней со дня покупки вправе потребовать замены или возврата при любом недостатке. 10 дней < 15 дней, поэтому Белкина вправе требовать замены; отказ и направление в мастерскую незаконны. <span class='law'>(ст. 18, 21 Закона «О защите прав потребителей»)</span>" },
  { n: 28, topic: "Проезд на красный", q: "Приведите пример административной и пример уголовной ответственности за проезд на красный свет.", a: "<b>Административная:</b> водитель проехал на запрещающий сигнал без вредных последствий — штраф <span class='law'>(ст. 12.12 КоАП РФ)</span>. <b>Уголовная:</b> в результате ДТП по неосторожности причинён тяжкий вред здоровью или наступила смерть человека <span class='law'>(ст. 264 УК РФ)</span>." },
  { n: 29, topic: "Заполните пропуски", q: "1) Отрасль о брачном договоре — … 2) … ответственность за преступление. 3) Трудовой договор по общему правилу с … лет. 4) Способность своими действиями приобретать права и обязанности — …", a: "<b>1)</b> семейное право; <b>2)</b> уголовная; <b>3)</b> 16 лет; <b>4)</b> дееспособность." },
];

const container = document.getElementById('cards');
const tasksEl = document.getElementById('tasks');
const countEl = document.getElementById('count');
const emptyEl = document.getElementById('empty');
let currentTab = 'theory';

function render(items) {
  container.innerHTML = items.map(q => `
    <div class="card" data-n="${q.n}">
      <div class="num">${q.n}</div>
      <div class="body">
        <strong class="title">${q.title}</strong>
        <p>${q.text}</p>
      </div>
    </div>
  `).join('');
  const c = items.length;
  countEl.textContent = c === 58 ? '58 вопросов' : `${c} из 58`;
  emptyEl.classList.toggle('hidden', c > 0);
}

function renderTasks(items) {
  tasksEl.innerHTML = items.map(t => `
    <div class="task-card" data-n="${t.n}">
      <div class="task-head">
        <div class="num">${t.n}</div>
        <span class="topic">${t.topic}</span>
      </div>
      <div class="q">${t.q}</div>
      <div class="a">${t.a}</div>
    </div>
  `).join('');
  const c = items.length;
  countEl.textContent = c === 29 ? '29 задач' : `${c} из 29`;
  emptyEl.classList.toggle('hidden', c > 0);
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-theory').classList.toggle('active', tab === 'theory');
  document.getElementById('tab-tasks').classList.toggle('active', tab === 'tasks');
  container.classList.toggle('hidden', tab !== 'theory');
  tasksEl.classList.toggle('hidden', tab !== 'tasks');
  filterCards();
}

function filterCards() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (currentTab === 'theory') {
    const items = !q ? data : data.filter(d =>
      d.title.toLowerCase().includes(q) ||
      d.text.toLowerCase().includes(q) ||
      String(d.n) === q
    );
    render(items);
  } else {
    const items = !q ? tasks : tasks.filter(t =>
      t.topic.toLowerCase().includes(q) ||
      t.q.toLowerCase().includes(q) ||
      t.a.toLowerCase().includes(q) ||
      String(t.n) === q
    );
    renderTasks(items);
  }
}

render(data);
renderTasks(tasks);
</script>
</body>
</html>
